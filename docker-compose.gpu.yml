# Overlay GPU — Makefile merge khi NER_TRAIN_MODE=gpu hoặc NER_RUN_MODE=gpu
# Cần: nvidia-container-toolkit trên host (host có NVIDIA driver + `nvidia-smi` chạy được)
# Docs: https://docs.docker.com/compose/how-tos/gpu-support/

services:
  nlp:
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NER_GPU_ID:-0}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
